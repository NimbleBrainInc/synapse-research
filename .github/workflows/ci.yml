name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install deps (server + dev)
        run: uv sync

      # Tests run keyless — the conftest fixture monkeypatches GPTResearcher
      # so no real API keys are needed. If any test accidentally reaches the
      # real provider, it fails here.
      - name: pytest
        run: uv run pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: ""
          TAVILY_API_KEY: ""
          OPENAI_API_KEY: ""

      - name: ruff (lint)
        run: uv run ruff check src/ tests/

      - name: ruff (format)
        run: uv run ruff format --check src/ tests/

      - name: ty (typecheck)
        run: uv run ty check src/

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: UI build (production bundle)
        run: cd ui && npm ci && npm run build
